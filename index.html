<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Trainer</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root { --sq: 60px; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #2d2d2d;
    color: #ddd;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}
#app {
    text-align: center;
    width: 100%;
    max-width: 560px;
    padding: 44px 10px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
}
h1 { font-size: clamp(22px, calc(var(--sq) * 0.467), 40px); margin-bottom: 20px; color: #eee; }
h2 { font-size: clamp(18px, calc(var(--sq) * 0.367), 32px); margin-bottom: 15px; color: #ddd; }
.btn {
    display: block;
    width: min(280px, calc(100% - 20px));
    margin: 10px auto;
    padding: 12px 0;
    background: #444;
    border: none;
    border-radius: 6px;
    color: #ddd;
    font-size: clamp(14px, calc(var(--sq) * 0.3), 24px);
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
    min-height: 44px;
}
.btn:hover { background: #5a5a5a; }
.btn-small {
    width: auto;
    display: inline-block;
    padding: 8px 20px;
    font-size: clamp(12px, calc(var(--sq) * 0.25), 20px);
    margin: 5px;
    min-height: 44px;
}
.btn-menu { width: min(300px, calc(100% - 20px)); padding: 14px 0; font-size: clamp(16px, calc(var(--sq) * 0.333), 28px); }
#board-wrap {
    display: inline-block;
    position: relative;
    margin: 10px auto;
}
#board {
    display: grid;
    grid-template-columns: calc(var(--sq) * 0.4) repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr) calc(var(--sq) * 0.4);
    width: calc(var(--sq) * 8 + var(--sq) * 0.4);
    height: calc(var(--sq) * 8 + var(--sq) * 0.4);
    user-select: none;
}
.sq {
    width: var(--sq);
    height: var(--sq);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(26px, calc(var(--sq) * 0.667), 60px);
    cursor: pointer;
    font-family: "Segoe UI Symbol", "DejaVu Sans", "Arial Unicode MS", sans-serif;
    transition: box-shadow 0.1s;
    position: relative;
}
.sq.vm::after {
    content: '';
    display: block;
    width: calc(var(--sq) * 0.25);
    height: calc(var(--sq) * 0.25);
    border-radius: 50%;
    background: rgba(0,128,0,0.6);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}
.sq.vm-capture {
    box-shadow: inset 0 0 0 2px rgba(255,0,0,0.5);
}
.sq.wp { text-shadow: 0 0 1px #000, 0 0 1px #000, 1px 1px 2px rgba(0,0,0,0.5); }
.sq.light { background: #f0d9b5; }
.sq.dark { background: #b58863; }
.sq.sel { box-shadow: inset 0 0 0 3px #ff0; }
.sq:hover { filter: brightness(1.1); }
.label-r, .label-f {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(10px, calc(var(--sq) * 0.217), 16px);
    color: #999;
    font-family: "Segoe UI", Arial, sans-serif;
}
.label-r { width: calc(var(--sq) * 0.4); height: var(--sq); }
.label-f { width: var(--sq); height: calc(var(--sq) * 0.4); }
#status {
    margin-top: 12px;
    font-size: clamp(13px, calc(var(--sq) * 0.283), 22px);
    color: #ccc;
    min-height: 24px;
}
.lesson-item {
    padding: 6px 12px;
    margin: 2px 0;
    cursor: pointer;
    border-radius: 4px;
    font-size: clamp(12px, calc(var(--sq) * 0.25), 20px);
    text-align: left;
    min-height: 44px;
    display: flex;
    align-items: center;
}
.lesson-item:hover { background: #444; }
.diff-header {
    font-size: clamp(11px, calc(var(--sq) * 0.233), 18px);
    color: #999;
    margin-top: 8px;
    margin-bottom: 2px;
    text-align: left;
    padding-left: 8px;
    font-style: italic;
}
#lesson-info {
    margin-top: 12px;
    font-size: clamp(13px, calc(var(--sq) * 0.267), 22px);
    color: #ccc;
    line-height: 1.5;
}
#lesson-comment {
    margin-top: 6px;
    font-size: clamp(12px, calc(var(--sq) * 0.25), 20px);
    color: #aaa;
    min-height: 20px;
    max-width: min(500px, calc(100% - 20px));
    margin-left: auto;
    margin-right: auto;
}
#lesson-list-wrap {
    max-height: clamp(200px, calc(var(--sq) * 6.667), 400px);
    overflow-y: auto;
    width: min(480px, calc(100% - 20px));
    margin: 0 auto;
    text-align: left;
}
.hidden { display: none; }
.back { margin-top: 20px; }
.zoom-ctrl {
    position: fixed;
    top: 8px;
    right: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(40,40,40,0.9);
    padding: 6px 12px;
    border-radius: 6px;
    z-index: 999;
    user-select: none;
}
.zoom-ctrl input { width: 80px; cursor: pointer; }
.zoom-ctrl label, .zoom-ctrl span {
    color: #aaa;
    font-family: "Segoe UI", Arial, sans-serif;
}
.zoom-ctrl label:first-child { font-size: 11px; }
.zoom-ctrl label:last-child { font-size: 16px; }
.zoom-ctrl span {
    font-size: 13px;
    min-width: 36px;
    text-align: right;
}
</style>
</head>
<body>
<div class="zoom-ctrl">
    <label>A</label>
    <input type="range" id="zoom-slider" min="0.5" max="2.5" step="0.1" value="1">
    <label>A</label>
    <span id="zoom-label">100%</span>
</div>
<div id="app">
    <div id="screen-menu">
        <h1>CHESS TRAINER</h1>
        <button class="btn btn-menu" onclick="StartLocalMP()">Local MP</button>
        <button class="btn btn-menu" onclick="ShowAISetup()">Play vs AI</button>
        <button class="btn btn-menu" onclick="ShowCategory()">Teaching Lessons</button>
        <button class="btn btn-menu" onclick="ShowMultiplayer()">Multiplayer</button>
        <button class="btn btn-menu" onclick="ShowTournamentSetup()">Tournament</button>
        <button class="btn btn-menu" onclick="QuitApp()">Quit</button>
    </div>

    <div id="screen-ai-setup" class="hidden">
        <h2>Play vs AI</h2>
        <div style="margin:10px 0;text-align:center">
            <div style="font-size:14px;color:#ccc;margin-bottom:4px">You play as</div>
            <div>
                <button id="ai-side-w" class="btn btn-small" onclick="SetAISide(true)" style="background:#5a5a5a;font-weight:bold">White</button>
                <button id="ai-side-b" class="btn btn-small" onclick="SetAISide(false)">Black</button>
            </div>
        </div>
        <div style="margin:8px 0;text-align:center">
            <div style="font-size:14px;color:#ccc;margin-bottom:4px">Strength</div>
            <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:5px;max-width:500px;margin:0 auto">
                <button id="ai-str-0" class="btn btn-small" onclick="SetStrength(0)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Novice</button>
                <button id="ai-str-1" class="btn btn-small" onclick="SetStrength(1)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Intermediate</button>
                <button id="ai-str-2" class="btn btn-small" onclick="SetStrength(2)" style="background:#5a5a5a;font-weight:bold;font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Competitor</button>
                <button id="ai-str-3" class="btn btn-small" onclick="SetStrength(3)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Master</button>
                <button id="ai-str-4" class="btn btn-small" onclick="SetStrength(4)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Grandmaster</button>
                <button id="ai-str-5" class="btn btn-small" onclick="SetStrength(5)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px;color:#ffd700">Random</button>
            </div>
        </div>
        <div style="margin:8px 0;text-align:center">
            <div style="font-size:14px;color:#ccc;margin-bottom:4px">Persona</div>
            <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:5px;max-width:500px;margin:0 auto">
                <button id="ai-per-0" class="btn btn-small" onclick="SetPersona(0)" style="background:#5a5a5a;font-weight:bold;font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Novice</button>
                <button id="ai-per-1" class="btn btn-small" onclick="SetPersona(1)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Defender</button>
                <button id="ai-per-2" class="btn btn-small" onclick="SetPersona(2)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Conservative</button>
                <button id="ai-per-3" class="btn btn-small" onclick="SetPersona(3)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Flanker</button>
                <button id="ai-per-4" class="btn btn-small" onclick="SetPersona(4)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Reckless</button>
                <button id="ai-per-5" class="btn btn-small" onclick="SetPersona(5)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Attacker</button>
            </div>
        </div>
        <div style="margin:8px 0;text-align:center">
            <div style="font-size:14px;color:#ccc;margin-bottom:4px">Modifier</div>
            <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:5px;max-width:500px;margin:0 auto">
                <button id="ai-mod-0" class="btn btn-small" onclick="SetModifier(0)" style="background:#5a5a5a;font-weight:bold;font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Static</button>
                <button id="ai-mod-1" class="btn btn-small" onclick="SetModifier(1)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Fluid</button>
                <button id="ai-mod-2" class="btn btn-small" onclick="SetModifier(2)" style="font-size:clamp(9px,calc(var(--sq)*0.18),13px);padding:5px 8px">Fluent</button>
            </div>
            <div id="ai-diff-desc" style="font-size:12px;color:#999;margin-top:4px;min-height:16px"></div>
        </div>
        <button class="btn btn-menu" onclick="StartAIGame()">Start Game</button>
        <button class="btn btn-small back" onclick="BackToMenu()">Back</button>
    </div>

    <div id="screen-play" class="hidden">
        <h2 id="screen-play-title">Local MP</h2>
        <div id="board-wrap"></div>
        <div id="status">White's turn</div>
        <div id="clock-display" style="font-size:clamp(11px,calc(var(--sq)*0.2),16px);color:#aaa;margin:2px auto"></div>
        <div id="history-wrap" style="width:min(400px,calc(100%-20px));margin:8px auto;text-align:left;font-size:clamp(11px,calc(var(--sq)*0.233),18px);color:#aaa;max-height:80px;overflow-y:auto;font-family:monospace"></div>
        <div>
            <button class="btn btn-small" onclick="UndoLastMove()">Undo (<u>U</u>)</button>
            <button class="btn btn-small" onclick="ExportPGNFromUI()">PGN (<u>P</u>)</button>
            <button class="btn btn-small" onclick="BackToMenu()">Back to Menu</button>
        </div>
    </div>

    <div id="screen-tournament-setup" class="hidden">
        <h2>Tournament</h2>
        <div style="margin:12px auto;text-align:center">
            <div style="font-size:15px;color:#ccc;margin-bottom:8px">Number of players</div>
            <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px;max-width:400px;margin:0 auto">
                <button class="btn btn-small" onclick="SetTournSize(8)" style="font-size:13px;padding:6px 12px">8</button>
                <button class="btn btn-small" onclick="SetTournSize(16)" style="background:#5a5a5a;font-weight:bold;font-size:13px;padding:6px 12px">16</button>
                <button class="btn btn-small" onclick="SetTournSize(32)" style="font-size:13px;padding:6px 12px">32</button>
                <button class="btn btn-small" onclick="SetTournSize(64)" style="font-size:13px;padding:6px 12px">64</button>
                <button class="btn btn-small" onclick="SetTournSize(128)" style="font-size:13px;padding:6px 12px">128</button>
            </div>
            <div style="margin-top:14px">
                <button class="btn btn-menu" onclick="StartTournament()">Generate &amp; Start</button>
            </div>
            <div style="margin-top:8px">
                <button class="btn btn-small" onclick="LoadTournament(); ShowTournamentBracket();" style="background:#5a5a5a">Resume Saved</button>
            </div>
        </div>
        <button class="btn btn-small back" onclick="BackToMenu()">Back</button>
    </div>

    <div id="screen-tournament-bracket" class="hidden">
        <h2 id="tourn-title">Tournament Bracket</h2>
        <div id="tourn-info" style="font-size:13px;color:#999;margin:4px auto;text-align:center"></div>
        <div id="tourn-bracket-wrap" style="overflow-x:auto;overflow-y:auto;max-height:60vh;width:100%;margin:4px auto"></div>
        <div style="margin:6px auto;text-align:center">
            <button id="tourn-play-btn" class="btn btn-menu" onclick="PlayNextTournamentMatch()" style="display:none">Play Next Match</button>
            <button class="btn btn-small" onclick="ShowTournamentResults()" style="display:none" id="tourn-results-btn">View Results</button>
            <button class="btn btn-small" onclick="ShowTournamentSetup()">Back</button>
            <button class="btn btn-small" onclick="ClearTournamentSave(); tournamentActive = false; BackToMenu()">Exit Tournament</button>
        </div>
    </div>

    <div id="screen-tournament-results" class="hidden">
        <h2>Tournament Results</h2>
        <div id="tourn-results-wrap" style="overflow-x:auto;max-height:65vh;width:100%;margin:4px auto"></div>
        <button class="btn btn-small back" onclick="ShowTournamentBracket()">Bracket</button>
        <button class="btn btn-small" onclick="ShowTournamentSetup()">New Tournament</button>
    </div>

    <div id="screen-category" class="hidden">
        <h2>Select Category</h2>
        <button class="btn" onclick="ShowLessonList('White')">White Openings</button>
        <button class="btn" onclick="ShowLessonList('Black')">Black Defenses</button>
        <button class="btn" onclick="ShowFamilyList()">By Opening Family</button>
        <button class="btn" onclick="ShowLessonList('')">All Lessons</button>
        <button class="btn btn-small back" onclick="BackToMenu()">Back</button>
    </div>

    <div id="screen-family" class="hidden">
        <h2>Opening Families</h2>
        <div id="family-list-wrap"></div>
        <button class="btn btn-small back" onclick="ShowCategory()">Back</button>
    </div>

    <div id="screen-lessonlist" class="hidden">
        <div id="lesson-list-header"></div>
        <div id="lesson-list-wrap"></div>
        <button class="btn btn-small back" onclick="LessonListBack()">Back</button>
    </div>

    <div id="screen-lesson" class="hidden">
        <h2 id="lesson-name"></h2>
        <div id="board-wrap-lesson"></div>
        <div id="lesson-info"></div>
        <div id="lesson-comment"></div>
        <div id="lesson-buttons"></div>
        <button class="btn btn-small back" onclick="ExitLesson()">Exit</button>
    </div>

    <div id="screen-multiplayer" class="hidden">
        <h2>Multiplayer</h2>
        <button class="btn btn-menu" onclick="HostGame()">Host Game</button>
        <button class="btn btn-menu" onclick="ShowJoinGame()">Join Game</button>
        <button class="btn btn-small back" onclick="BackToMenu()">Back</button>
    </div>

    <div id="screen-host" class="hidden">
        <h2>Host Game</h2>
        <div id="host-status" style="margin:20px 0;font-size:clamp(14px,calc(var(--sq)*0.3),22px);color:#ccc"></div>
        <div id="room-code-wrap" style="display:none">
            <p style="color:#aaa">Share this code with your opponent:</p>
            <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin:12px 0">
                <div id="code-display" style="font-size:clamp(28px,calc(var(--sq)*0.6),48px);font-weight:bold;letter-spacing:6px;color:#ffd700;background:#333;padding:12px 20px;border-radius:8px;font-family:monospace"></div>
                <button onclick="CopyRoomCode()" style="padding:12px 18px;font-size:clamp(14px,calc(var(--sq)*0.283),22px);background:#555;border:none;border-radius:6px;color:#ddd;cursor:pointer;min-height:44px">Copy</button>
            </div>
        </div>
        <button class="btn btn-small back" onclick="CancelHost()">Cancel</button>
    </div>

    <div id="screen-join" class="hidden">
        <h2>Join Game</h2>
        <div style="margin:16px auto;width:min(300px,calc(100%-40px))">
            <input type="text" id="join-code-input" placeholder="Enter host code" style="width:100%;padding:12px;font-size:clamp(16px,calc(var(--sq)*0.333),28px);text-align:center;background:#444;border:none;border-radius:6px;color:#ddd;font-family:monospace;letter-spacing:3px;text-transform:uppercase">
        </div>
        <button class="btn btn-small" onclick="JoinGame()">Connect</button>
        <div id="join-status" style="margin:12px 0;font-size:clamp(13px,calc(var(--sq)*0.267),20px);color:#ccc"></div>
        <button class="btn btn-small back" onclick="CancelJoin()">Back</button>
    </div>
</div>

<script>
// ============ PIECE HELPERS ============
function GetPieceChar(p) {
    switch (p) {
        case 'K': return '\u2654'; case 'Q': return '\u2655';
        case 'R': return '\u2656'; case 'B': return '\u2657';
        case 'N': return '\u2658'; case 'P': return '\u2659';
        case 'k': return '\u265A'; case 'q': return '\u265B';
        case 'r': return '\u265C'; case 'b': return '\u265D';
        case 'n': return '\u265E'; case 'p': return '\u265F';
        default: return '';
    }
}
function IsWhitePiece(p) { return p >= 'A' && p <= 'Z'; }
function IsBlackPiece(p) { return p >= 'a' && p <= 'z'; }

// ============ BOARD STATE ============
let board = [];
let whiteTurn = true;
let kingMoved = [false, false];
let rookMoved = [[false, false], [false, false]];
let enPassantRow = -1;
let enPassantCol = -1;
let boardHistory = [];
let moveHistory = [];

function InitializeBoard() {
    board = [
        ['r','n','b','q','k','b','n','r'],
        ['p','p','p','p','p','p','p','p'],
        ['.','.','.','.','.','.','.','.'],
        ['.','.','.','.','.','.','.','.'],
        ['.','.','.','.','.','.','.','.'],
        ['.','.','.','.','.','.','.','.'],
        ['P','P','P','P','P','P','P','P'],
        ['R','N','B','Q','K','B','N','R']
    ];
    kingMoved = [false, false];
    rookMoved = [[false, false], [false, false]];
    whiteTurn = true;
    enPassantRow = enPassantCol = -1;
    moveHistory = [];
    boardHistory = [];
}

// ============ MOVE VALIDATION ============
function IsOnBoard(r, c) { return r >= 0 && r <= 7 && c >= 0 && c <= 7; }

function ConvertMove(sq) {
    if (sq.length !== 2) return null;
    let c = sq.charCodeAt(0) - 97;
    let r = 8 - (sq.charCodeAt(1) - 48);
    if (r < 0 || r > 7 || c < 0 || c > 7) return null;
    return { r: r, c: c };
}

function IsValidMove(fr, fc, tr, tc, piece) {
    let dr = tr - fr;
    let dc = tc - fc;
    let adr = Math.abs(dr);
    let adc = Math.abs(dc);
    let p = piece.toLowerCase();

    if (p === 'p') {
        let dir = IsWhitePiece(piece) ? -1 : 1;
        let startRow = IsWhitePiece(piece) ? 6 : 1;
        if (dc === 0 && dr === dir && board[tr][tc] === '.') return true;
        if (dc === 0 && dr === 2 * dir && fr === startRow && board[tr][tc] === '.') {
            if (board[fr + dir][fc] === '.') return true;
        }
        if (adc === 1 && dr === dir && (board[tr][tc] !== '.' || (tr === enPassantRow && tc === enPassantCol))) return true;
        return false;
    }

    if (p === 'n') return (adr === 2 && adc === 1) || (adr === 1 && adc === 2);

    if (p === 'b') {
        if (adr !== adc || dr === 0) return false;
        let stepR = dr > 0 ? 1 : -1;
        let stepC = dc > 0 ? 1 : -1;
        let r = fr + stepR, c = fc + stepC;
        while (r !== tr) {
            if (board[r][c] !== '.') return false;
            r += stepR; c += stepC;
        }
        return true;
    }

    if (p === 'r') {
        if (dr !== 0 && dc !== 0) return false;
        let stepR = dr !== 0 ? (dr > 0 ? 1 : -1) : 0;
        let stepC = dc !== 0 ? (dc > 0 ? 1 : -1) : 0;
        let r = fr + stepR, c = fc + stepC;
        while (r !== tr || c !== tc) {
            if (board[r][c] !== '.') return false;
            r += stepR; c += stepC;
        }
        return true;
    }

    if (p === 'q') {
        if (dr === 0 || dc === 0) {
            let stepR = dr !== 0 ? (dr > 0 ? 1 : -1) : 0;
            let stepC = dc !== 0 ? (dc > 0 ? 1 : -1) : 0;
            let r = fr + stepR, c = fc + stepC;
            while (r !== tr || c !== tc) {
                if (board[r][c] !== '.') return false;
                r += stepR; c += stepC;
            }
            return true;
        }
        if (adr === adc) {
            let stepR = dr > 0 ? 1 : -1;
            let stepC = dc > 0 ? 1 : -1;
            let r = fr + stepR, c = fc + stepC;
            while (r !== tr) {
                if (board[r][c] !== '.') return false;
                r += stepR; c += stepC;
            }
            return true;
        }
        return false;
    }

    if (p === 'k') {
        if (adr <= 1 && adc <= 1) return true;
        if (adr === 0 && adc === 2) {
            let colorIdx = IsWhitePiece(piece) ? 0 : 1;
            let row = fr;
            if (kingMoved[colorIdx]) return false;
            if (dc === 2) {
                if (rookMoved[colorIdx][1]) return false;
                if (board[row][5] !== '.' || board[row][6] !== '.') return false;
                return true;
            }
            if (dc === -2) {
                if (rookMoved[colorIdx][0]) return false;
                if (board[row][1] !== '.' || board[row][2] !== '.' || board[row][3] !== '.') return false;
                return true;
            }
        }
        return false;
    }

    return false;
}

// ============ MOVE EXECUTION ============
function MovePiece(from, to) {
    let src = ConvertMove(from);
    let dst = ConvertMove(to);
    if (!src || !dst) return false;

    let fr = src.r, fc = src.c;
    let tr = dst.r, tc = dst.c;
    let piece = board[fr][fc];

    if (piece === '.') return false;
    if (whiteTurn && !IsWhitePiece(piece)) return false;
    if (!whiteTurn && !IsBlackPiece(piece)) return false;

    let destPiece = board[tr][tc];
    if (whiteTurn && IsWhitePiece(destPiece)) return false;
    if (!whiteTurn && IsBlackPiece(destPiece)) return false;

    if (!IsValidMove(fr, fc, tr, tc, piece)) return false;

    PushBoardState();

    let algebraic = ToAlgebraic(from, to);

    let epCapture = (piece.toLowerCase() === 'p' && tc !== fc && board[tr][tc] === '.');

    board[tr][tc] = piece;
    board[fr][fc] = '.';

    if (epCapture) {
        board[fr][tc] = '.';
    }

    // En passant tracking
    enPassantRow = enPassantCol = -1;
    if (piece.toLowerCase() === 'p' && Math.abs(tr - fr) === 2) {
        enPassantRow = Math.floor((fr + tr) / 2);
        enPassantCol = fc;
    }

    // Auto-promotion
    if (piece === 'P' && tr === 0) board[tr][tc] = 'Q';
    else if (piece === 'p' && tr === 7) board[tr][tc] = 'q';

    // Castling
    let colorIdx = whiteTurn ? 0 : 1;
    if (piece === 'K' || piece === 'k') {
        kingMoved[colorIdx] = true;
        if (tc - fc === 2) {
            board[fr][fc + 1] = board[fr][7];
            board[fr][7] = '.';
            rookMoved[colorIdx][1] = true;
        } else if (tc - fc === -2) {
            board[fr][fc - 1] = board[fr][0];
            board[fr][0] = '.';
            rookMoved[colorIdx][0] = true;
        }
    }

    // Rook moved tracking
    if (fr === 7 && fc === 0) rookMoved[0][0] = true;
    if (fr === 7 && fc === 7) rookMoved[0][1] = true;
    if (fr === 0 && fc === 0) rookMoved[1][0] = true;
    if (fr === 0 && fc === 7) rookMoved[1][1] = true;
    if (tr === 7 && tc === 0) rookMoved[0][0] = true;
    if (tr === 7 && tc === 7) rookMoved[0][1] = true;
    if (tr === 0 && tc === 0) rookMoved[1][0] = true;
    if (tr === 0 && tc === 7) rookMoved[1][1] = true;

    UpdateClock(whiteTurn);
    whiteTurn = !whiteTurn;

    moveHistory.push(algebraic);
    if (IsInCheck(!whiteTurn)) {
        UndoMove();
        return false;
    }
    return true;
}

// ============ NEW CORE FUNCTIONS ============
function PushBoardState() {
    let bs = {
        sq: board.map(row => [...row]),
        wt: whiteTurn,
        km: [...kingMoved],
        rm: [ [...rookMoved[0]], [...rookMoved[1]] ],
        epr: enPassantRow,
        epc: enPassantCol
    };
    boardHistory.push(bs);
}

function UndoMove() {
    if (boardHistory.length === 0 || moveHistory.length === 0) return false;
    let bs = boardHistory.pop();
    board = bs.sq.map(row => [...row]);
    whiteTurn = bs.wt;
    kingMoved = [...bs.km];
    rookMoved = [ [...bs.rm[0]], [...bs.rm[1]] ];
    enPassantRow = bs.epr;
    enPassantCol = bs.epc;
    moveHistory.pop();
    return true;
}

function GetValidMoves(fr, fc) {
    let moves = [];
    let piece = board[fr][fc];
    if (piece === '.') return moves;
    for (let tr = 0; tr < 8; tr++) {
        for (let tc = 0; tc < 8; tc++) {
            if (fr === tr && fc === tc) continue;
            let dest = board[tr][tc];
            if (dest !== '.' && IsWhitePiece(piece) === IsWhitePiece(dest)) continue;
            if (IsValidMove(fr, fc, tr, tc, piece))
                moves.push({r: tr, c: tc});
        }
    }
    return moves;
}

function IsSquareAttacked(row, col, byWhite) {
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++) {
            let p = board[r][c];
            if (p === '.') continue;
            if (byWhite && !IsWhitePiece(p)) continue;
            if (!byWhite && !IsBlackPiece(p)) continue;
            if (IsValidMove(r, c, row, col, p))
                return true;
        }
    return false;
}

function IsInCheck(whiteKing) {
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++) {
            let k = whiteKing ? 'K' : 'k';
            if (board[r][c] === k)
                return IsSquareAttacked(r, c, !whiteKing);
        }
    return false;
}

// ============ ALGEBRAIC NOTATION ============
function ToAlgebraic(from, to) {
    let src = ConvertMove(from), dst = ConvertMove(to);
    if (!src || !dst) return '';
    let fr = src.r, fc = src.c, tr = dst.r, tc = dst.c;
    let piece = board[fr][fc];
    if (piece === '.') return '';

    if (piece.toLowerCase() === 'k') {
        if (tc - fc === 2) return 'O-O';
        if (tc - fc === -2) return 'O-O-O';
    }

    let capture = (board[tr][tc] !== '.');

    if (piece.toLowerCase() === 'p') {
        let result = '';
        if (capture) {
            result += String.fromCharCode(97 + fc) + 'x';
        }
        result += to;
        if ((IsWhitePiece(piece) && tr === 0) || (IsBlackPiece(piece) && tr === 7))
            result += '=Q';
        return result;
    }

    let pieceChar = piece.toUpperCase();
    let sources = [];
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
            if (board[r][c] === piece && IsValidMove(r, c, tr, tc, piece)) {
                sources.push(String.fromCharCode(97 + c) + String.fromCharCode(48 + (8 - r)));
            }

    let result = pieceChar;

    if (sources.length > 1) {
        let otherSameFile = false, otherSameRank = false;
        let movingFile = String.fromCharCode(97 + fc);
        let movingRank = String.fromCharCode(48 + (8 - fr));
        for (let s of sources) {
            if (s === from) continue;
            if (s[0] === movingFile) otherSameFile = true;
            if (s[1] === movingRank) otherSameRank = true;
        }
        if (otherSameFile) {
            if (otherSameRank) { result += movingFile + movingRank; }
            else { result += movingRank; }
        } else {
            result += movingFile;
        }
    }

    if (capture) result += 'x';
    result += to;
    return result;
}

function ExportPGN() {
    let pgn = '[Event "Chess Trainer Game"]\n[Site "?"]\n';
    let d = new Date();
    let ds = d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    pgn += '[Date "' + ds + '"]\n[Round "?"]\n[White "Player"]\n[Black "Player"]\n[Result "*"]\n\n';
    for (let i = 0; i < moveHistory.length; i++) {
        if (i % 2 === 0) pgn += Math.floor(i/2) + 1 + '. ';
        pgn += moveHistory[i] + ' ';
    }
    pgn += '*\n';
    return pgn;
}

// ============ ALGEBRAIC NOTATION ============
function FindPieceSource(pieceLetter, to, fileFilter, rankFilter) {
    let boardChar = whiteTurn ? pieceLetter : pieceLetter.toLowerCase();
    let tr = 8 - (to.charCodeAt(1) - 48);
    let tc = to.charCodeAt(0) - 97;
    let foundR = -1, foundC = -1, count = 0;

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            if (board[r][c] !== boardChar) continue;
            if (fileFilter && c !== (fileFilter.charCodeAt(0) - 97)) continue;
            if (rankFilter && (8 - r) !== (rankFilter.charCodeAt(0) - 48)) continue;
            if (IsValidMove(r, c, tr, tc, board[r][c])) {
                foundR = r; foundC = c; count++;
            }
        }
    }

    if (count === 1) {
        let from = String.fromCharCode(97 + foundC) + String.fromCharCode(48 + (8 - foundR));
        return from;
    }
    return '';
}

function FindPawnSource(to, fileHint) {
    let tr = 8 - (to.charCodeAt(1) - 48);
    let tc = to.charCodeAt(0) - 97;
    let dir = whiteTurn ? -1 : 1;
    let pawnChar = whiteTurn ? 'P' : 'p';
    let foundR = -1, foundC = -1, count = 0;
    let isCapture = (fileHint && fileHint !== to[0]);

    if (isCapture) {
        let fc = fileHint.charCodeAt(0) - 97;
        let fr = tr - dir;
        if (fr >= 0 && fr <= 7 && Math.abs(fc - tc) === 1 && board[fr][fc] === pawnChar) {
            if (IsValidMove(fr, fc, tr, tc, pawnChar)) {
                foundR = fr; foundC = fc; count = 1;
            }
        }
    } else {
        for (let step = 1; step <= 2; step++) {
            let fr = tr - step * dir;
            let fc = tc;
            if (fr >= 0 && fr <= 7 && board[fr][fc] === pawnChar) {
                if (IsValidMove(fr, fc, tr, tc, pawnChar)) {
                    foundR = fr; foundC = fc; count++;
                }
            }
        }
    }

    if (count === 1) {
        return String.fromCharCode(97 + foundC) + String.fromCharCode(48 + (8 - foundR));
    }
    return '';
}

function ParseAlgebraic(input) {
    let s = input.trim();

    // Strip check/checkmate symbols
    while (s.length > 0 && (s[s.length - 1] === '+' || s[s.length - 1] === '#'))
        s = s.slice(0, -1);

    // Castling
    if (s === 'O-O' || s === '0-0') {
        let row = whiteTurn ? 7 : 0;
        return { from: 'e' + (8 - row), to: 'g' + (8 - row) };
    }
    if (s === 'O-O-O' || s === '0-0-0') {
        let row = whiteTurn ? 7 : 0;
        return { from: 'e' + (8 - row), to: 'c' + (8 - row) };
    }

    // Promotion
    let eq = s.indexOf('=');
    if (eq !== -1) s = s.substring(0, eq);

    // Strip piece suffix for promotion
    if (s.length >= 3) {
        let last = s[s.length - 1];
        if (last >= 'A' && last <= 'Z' && (last === 'Q' || last === 'R' || last === 'B' || last === 'N'))
            s = s.slice(0, -1);
    }

    // Remove x
    let xPos = s.indexOf('x');
    if (xPos !== -1) s = s.substring(0, xPos) + s.substring(xPos + 1);

    if (s.length < 2) return null;

    let to = s.substring(s.length - 2);
    let prefix = s.substring(0, s.length - 2);

    if (prefix.length === 0) {
        let from = FindPawnSource(to, '');
        return from ? { from: from, to: to } : null;
    }

    let first = prefix[0];
    if (first >= 'A' && first <= 'Z') {
        let disambig = prefix.substring(1);
        let fileFilter = '', rankFilter = '';
        for (let i = 0; i < disambig.length; i++) {
            if (disambig[i] >= 'a' && disambig[i] <= 'h')
                fileFilter = disambig[i];
            else if (disambig[i] >= '1' && disambig[i] <= '8')
                rankFilter = disambig[i];
        }
        let from = FindPieceSource(first, to, fileFilter, rankFilter);
        return from ? { from: from, to: to } : null;
    } else {
        let from = FindPawnSource(to, first);
        return from ? { from: from, to: to } : null;
    }
}

// Fluent: drifting blend weights for the 6 base personas
let fluentWeights = [1/6, 1/6, 1/6, 1/6, 1/6, 1/6];

function DriftFluentWeights() {
    for (let i = 0; i < 6; i++) {
        fluentWeights[i] += (Math.random() - 0.5) * 0.06;
        if (fluentWeights[i] < 0.02) fluentWeights[i] = 0.02;
    }
    let sum = fluentWeights.reduce((a, b) => a + b, 0);
    for (let i = 0; i < 6; i++) fluentWeights[i] /= sum;
}

function SelectFluidPersona() {
    let side = !playerSide;
    let wMat = 0, bMat = 0;
    let wkr = -1, wkc = -1, bkr = -1, bkc = -1;
    let wPawnShield = 0, bPawnShield = 0;
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            let p = board[r][c];
            if (p === '.') continue;
            let v = PIECE_VALS[p.toUpperCase()] || 0;
            if (IsWhitePiece(p)) wMat += v; else bMat += v;
            if (p === 'K') { wkr = r; wkc = c; }
            if (p === 'k') { bkr = r; bkc = c; }
        }
    }
    if (wkr > 0) {
        for (let d = -1; d <= 1; d++) {
            let pc = wkc + d;
            if (pc >= 0 && pc < 8 && board[wkr-1][pc] === 'P') wPawnShield++;
        }
    }
    if (bkr < 7) {
        for (let d = -1; d <= 1; d++) {
            let pc = bkc + d;
            if (pc >= 0 && pc < 8 && board[bkr+1][pc] === 'p') bPawnShield++;
        }
    }
    let pieceCount = 0;
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++) {
            let p = board[r][c];
            if (p !== '.' && p !== 'P' && p !== 'p' && p !== 'K' && p !== 'k') pieceCount++;
        }
    let openFiles = 0;
    for (let c = 0; c < 8; c++) {
        let hasPawn = false;
        for (let r = 0; r < 8; r++) if (board[r][c] === 'P' || board[r][c] === 'p') hasPawn = true;
        if (!hasPawn) openFiles++;
    }
    let matDiff = side ? wMat - bMat : bMat - wMat;
    let ownShield = side ? wPawnShield : bPawnShield;
    let oppShield = side ? bPawnShield : wPawnShield;
    // Losing material -> counter-attack
    if (matDiff < -300) return oppShield < 2 ? 5 : 4;
    // Winning material -> consolidate
    if (matDiff > 300) return 1;
    // Own king exposed
    if (ownShield < 2) return 1;
    // Opponent king exposed
    if (oppShield < 2) return 5;
    // Endgame
    if (pieceCount <= 6) return 2;
    // Open position
    if (openFiles >= 3) return 4;
    // Closed/flank position
    return 3;
}

    [-50,-40,-30,-30,-30,-30,-40,-50]
];
const PST_B = [
    [-20,-10,-10,-10,-10,-10,-10,-20],
    [-10,  0,  0,  0,  0,  0,  0,-10],
    [-10,  0, 10, 10, 10, 10,  0,-10],
    [-10,  5,  5, 10, 10,  5,  5,-10],
    [-10,  0, 10, 10, 10, 10,  0,-10],
    [-10, 10, 10, 10, 10, 10, 10,-10],
    [-10,  5,  0,  0,  0,  0,  5,-10],
    [-20,-10,-10,-10,-10,-10,-10,-20]
];
const PST_R = [
    [ 0, 0, 0, 0, 0, 0, 0, 0],
    [ 5,10,10,10,10,10,10, 5],
    [-5, 0, 0, 0, 0, 0, 0,-5],
    [-5, 0, 0, 0, 0, 0, 0,-5],
    [-5, 0, 0, 0, 0, 0, 0,-5],
    [-5, 0, 0, 0, 0, 0, 0,-5],
    [-5, 0, 0, 0, 0, 0, 0,-5],
    [ 0, 0, 0, 5, 5, 0, 0, 0]
];
const PST_Q = [
    [-20,-10,-10, -5, -5,-10,-10,-20],
    [-10,  0,  5,  0,  0,  0,  0,-10],
    [-10,  5,  5,  5,  5,  5,  0,-10],
    [ -5,  0,  5,  5,  5,  5,  0, -5],
    [  0,  0,  5,  5,  5,  5,  0, -5],
    [-10,  0,  5,  5,  5,  5,  0,-10],
    [-10,  0,  0,  0,  0,  0,  0,-10],
    [-20,-10,-10, -5, -5,-10,-10,-20]
];
const PST_K = [
    [-30,-40,-40,-50,-50,-40,-40,-30],
    [-30,-40,-40,-50,-50,-40,-40,-30],
    [-30,-40,-40,-50,-50,-40,-40,-30],
    [-30,-40,-40,-50,-50,-40,-40,-30],
    [-20,-30,-30,-40,-40,-30,-30,-20],
    [-10,-20,-20,-20,-20,-20,-20,-10],
    [ 20, 20,  0,  0,  0,  0, 20, 20],
    [ 20, 30, 10,  0,  0, 10, 30, 20]
];

// ============ RENDER FUNCTIONS ============
function RenderBoardHTML(containerId, selR, selC) {
    let validMoves = [];
    if (selR !== -1 && selC !== -1) {
        validMoves = GetValidMoves(selR, selC);
    }
    let html = '<div id="board-wrap"><div id="board">';
    for (let r = 0; r < 8; r++) {
        html += `<div class="label-r">${8 - r}</div>`;
        for (let c = 0; c < 8; c++) {
            let light = (r + c) % 2 === 0;
            let sel = (r === selR && c === selC) ? ' sel' : '';
            let piece = board[r][c];
            let ch = piece !== '.' ? GetPieceChar(piece) : '';
            let pc = piece !== '.' ? (IsWhitePiece(piece) ? '#e8e8e8' : '#2a2a2a') : '';
            let style = pc ? ` style="color:${pc}"` : '';
            let vmClass = '';
            if (selR !== -1 && validMoves.some(m => m.r === r && m.c === c)) {
                vmClass = piece !== '.' ? ' vm-capture' : ' vm';
            }
            let wpClass = piece !== '.' && IsWhitePiece(piece) ? ' wp' : '';
            html += `<div class="sq ${light ? 'light' : 'dark'}${sel}${vmClass}${wpClass}" data-r="${r}" data-c="${c}"${style}>${ch}</div>`;
        }
    }
    for (let c = 0; c < 8; c++) {
        let label = c === 0 ? '<div class="label-r" style="visibility:hidden"></div>' : '';
        html += label + `<div class="label-f">${String.fromCharCode(97 + c)}</div>`;
    }
    html += '</div></div>';
    document.getElementById(containerId).innerHTML = html;

    // Attach click handler
    document.querySelectorAll(`#${containerId} .sq`).forEach(el => {
        el.addEventListener('click', function() {
            let r = parseInt(this.dataset.r);
            let c = parseInt(this.dataset.c);
            OnSquareClick(r, c);
        });
    });
}

function ShowScreen(id) {
    document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    currentScreen = id.replace('screen-', '');
}

function QuitApp() {
    document.getElementById('app').innerHTML = '<p style="color:#888;font-size:20px;margin-top:100px">Thanks for playing!</p>';
}

function UpdateHistoryDisplay() {
    let el = document.getElementById('history-wrap');
    if (!el) return;
    if (moveHistory.length === 0) {
        el.textContent = '';
        return;
    }
    let lines = [];
    for (let i = 0; i < moveHistory.length; i += 2) {
        let num = Math.floor(i / 2) + 1;
        let w = moveHistory[i] || '';
        let b = (i + 1 < moveHistory.length) ? moveHistory[i + 1] : '';
        lines.push(num + '. ' + w + (b ? ' ' + b : ''));
    }
    el.textContent = lines.join('  ');
    el.scrollTop = el.scrollHeight;
}

function UndoLastMove() {
    if (isMultiplayer) return;
    if (gameMode === 'ai') {
        if (UndoMove()) UndoMove(); // undo AI + human
    } else {
        UndoMove(); // undo 1 move in free/local MP
    }
    selRow = selCol = -1;
    gameStatus = whiteTurn ? "White's turn" : "Black's turn";
    if (IsInCheck(whiteTurn)) gameStatus += '  Check!';
    RenderBoardHTML('board-wrap', selRow, selCol);
    document.getElementById('status').textContent = gameStatus;
    UpdateHistoryDisplay();
    UpdateClockDisplay();
}

function ExportPGNFromUI() {
    let pgn = ExportPGN();
    let blob = new Blob([pgn], { type: 'text/plain' });
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'chess_game.pgn';
    a.click();
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(pgn);
    }
    // iOS fallback: show PGN in a prompt
    if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
        let textarea = document.createElement('textarea');
        textarea.value = pgn;
        document.body.appendChild(textarea);
        textarea.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(textarea);
        gameStatus = 'PGN copied to clipboard';
        if (currentScreen === 'play') document.getElementById('status').textContent = gameStatus;
    }
}

// ============ PLAY SCREEN ============
function StartLocalMP() {
    gameMode = 'free';
    InitializeBoard();
    selRow = selCol = -1;
    whiteClock = 0;
    blackClock = 0;
    ResetClock(true);
    gameStatus = "White's turn";
    document.getElementById('screen-play-title').textContent = 'Local MP';
    ShowScreen('screen-play');
    RenderBoardHTML('board-wrap', selRow, selCol);
    document.getElementById('status').textContent = gameStatus;
    UpdateHistoryDisplay();
    UpdateClockDisplay();
}

function OnSquareClick(row, col) {
    if (currentScreen === 'play') {
        if (gameMode === 'ai' && whiteTurn !== playerSide) return;
        if (selRow === -1) {
            let p = board[row][col];
            if (p !== '.' && IsWhitePiece(p) === whiteTurn) {
                selRow = row; selCol = col;
                gameStatus = (whiteTurn ? "White" : "Black") + ": " + GetPieceChar(p) + " selected";
                RenderBoardHTML('board-wrap', selRow, selCol);
                document.getElementById('status').textContent = gameStatus;
            }
        } else {
            let from = String.fromCharCode(97 + selCol) + String.fromCharCode(48 + (8 - selRow));
            let to = String.fromCharCode(97 + col) + String.fromCharCode(48 + (8 - row));
            if (MovePiece(from, to)) {
                if (isMultiplayer && conn && conn.open) {
                    conn.send({ type: 'move', from: from, to: to });
                }
                let inCheck = IsInCheck(whiteTurn);
                gameStatus = whiteTurn ? "White's turn" : "Black's turn";
                if (inCheck) gameStatus += '  Check!';
                if (gameMode === 'ai' && whiteTurn !== playerSide) {
                    gameStatus = 'AI thinking...';
                    selRow = selCol = -1;
                    RenderBoardHTML('board-wrap', selRow, selCol);
                    document.getElementById('status').textContent = gameStatus;
                    UpdateHistoryDisplay();
                    setTimeout(AIThinkAndMove, 300);
                    return;
                }
            } else {
                gameStatus = "Invalid move";
            }
            selRow = selCol = -1;
            RenderBoardHTML('board-wrap', selRow, selCol);
            document.getElementById('status').textContent = gameStatus;
            UpdateHistoryDisplay();
            UpdateClockDisplay();
        }
    }
}

// ============ AI: HELPERS ============
function GetPST(p, r, c) {
    if (p === 'P') return PST_P[r][c]; if (p === 'p') return -PST_P[7-r][7-c];
    if (p === 'N') return PST_N[r][c]; if (p === 'n') return -PST_N[7-r][7-c];
    if (p === 'B') return PST_B[r][c]; if (p === 'b') return -PST_B[7-r][7-c];
    if (p === 'R') return PST_R[r][c]; if (p === 'r') return -PST_R[7-r][7-c];
    if (p === 'Q') return PST_Q[r][c]; if (p === 'q') return -PST_Q[7-r][7-c];
    if (p === 'K') return PST_K[r][c]; if (p === 'k') return -PST_K[7-r][7-c];
    return 0;
}

function BoardFingerprint() {
    return board.map(r => r.join('')).join('/');
}

function BuildOpeningBook() {
    let book = {};
    for (let lesson of teachingGames) {
        InitializeBoard();
        moveHistory = [];
        boardHistory = [];
        whiteTurn = true;
        kingMoved = [false, false];
        rookMoved = [[false, false], [false, false]];
        enPassantRow = enPassantCol = -1;
        for (let i = 0; i < lesson.moves.length - 1; i++) {
            MovePiece(lesson.moves[i].from, lesson.moves[i].to);
            let fp = BoardFingerprint();
            let next = lesson.moves[i + 1];
            if (!book[fp]) book[fp] = [];
            book[fp].push({ from: next.from, to: next.to, family: lesson.family });
        }
    }
    InitializeBoard();
    moveHistory = [];
    boardHistory = [];
    return book;
}

function EnsureOpeningBook() {
    if (!openingBook) openingBook = BuildOpeningBook();
}

function LookupBookMove() {
    EnsureOpeningBook();
    let fp = BoardFingerprint();
    let entries = openingBook[fp];
    if (!entries || entries.length === 0) return null;
    return entries[Math.floor(Math.random() * entries.length)];
}

function EvaluatePawnStructure() {
    let score = 0;
    for (let c = 0; c < 8; c++) {
        let wc = 0, bc = 0;
        for (let r = 0; r < 8; r++) {
            if (board[r][c] === 'P') wc++;
            if (board[r][c] === 'p') bc++;
        }
        if (wc > 1) score -= 15 * (wc - 1);
        if (bc > 1) score += 15 * (bc - 1);
    }
    for (let c = 0; c < 8; c++) {
        let left = c > 0, right = c < 7;
        let wNbr = false, bNbr = false;
        for (let nc = (left ? c - 1 : 10); nc <= (right ? c + 1 : 10); nc += (nc === 10 ? 0 : 1) ? 0 : 0) {
            // simplified neighbor check
        }
        for (let nc of (left ? [c - 1] : []).concat(right ? [c + 1] : [])) {
            for (let r = 0; r < 8; r++) {
                if (board[r][nc] === 'P') wNbr = true;
                if (board[r][nc] === 'p') bNbr = true;
            }
        }
        if (!wNbr) for (let r = 0; r < 8; r++) if (board[r][c] === 'P') score -= 20;
        if (!bNbr) for (let r = 0; r < 8; r++) if (board[r][c] === 'p') score += 20;
    }
    return score;
}

// ============ AI: EVALUATION ============
function ComputeEvalComponents() {
    let material = 0, pst = 0, kingSafety = 0;
    let wkr = -1, wkc = -1, bkr = -1, bkc = -1;

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            let p = board[r][c];
            if (p === '.') continue;
            let sign = IsWhitePiece(p) ? 1 : -1;
            material += sign * (PIECE_VALS[p.toUpperCase()] || 0);
            pst += sign * GetPST(p, r, c);
            if (p === 'K') { wkr = r; wkc = c; }
            if (p === 'k') { bkr = r; bkc = c; }
        }
    }

    function knightGuardCount(kr, kc, forWhite) {
        const kdr = [-2,-1,1,2,2,1,-1,-2], kdc = [1,2,2,1,-1,-2,-2,-1];
        let count = 0;
        for (let d = 0; d < 8; d++) {
            let nr = kr + kdr[d], nc = kc + kdc[d];
            if (nr < 0 || nr > 7 || nc < 0 || nc > 7) continue;
            let p = board[nr][nc];
            if ((forWhite && p === 'N') || (!forWhite && p === 'n')) count++;
        }
        return count;
    }
    function backupKnights(kr, kc, forWhite) {
        const kdr = [-2,-1,1,2,2,1,-1,-2], kdc = [1,2,2,1,-1,-2,-2,-1];
        let covered = Array.from({length:8},()=>Array(8).fill(false));
        for (let dr = -1; dr <= 1; dr++)
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                let nr = kr + dr, nc = kc + dc;
                if (nr < 0 || nr > 7 || nc < 0 || nc > 7) continue;
                for (let d = 0; d < 8; d++) {
                    let nnr = nr + kdr[d], nnc = nc + kdc[d];
                    if (nnr < 0 || nnr > 7 || nnc < 0 || nnc > 7) continue;
                    covered[nnr][nnc] = true;
                }
            }
        let count = 0;
        for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++)
                if (covered[r][c] && ((forWhite && board[r][c] === 'N') || (!forWhite && board[r][c] === 'n'))) count++;
        return count;
    }

    if (wkr >= 0) {
        if (wkc >= 6 && wkr >= 6) kingSafety += 30;
        else if (wkc <= 1 && wkr >= 6) kingSafety += 20;
        let shield = 0;
        if (wkr > 0)
            for (let d = -1; d <= 1; d++) {
                let pc = wkc + d;
                if (pc >= 0 && pc < 8 && board[wkr - 1][pc] === 'P') { kingSafety += 10; shield++; }
            }
        let kg = knightGuardCount(wkr, wkc, true);
        if (kg > 0) kingSafety += 15 * Math.min(kg, 2);
        let bk = backupKnights(wkr, wkc, true);
        if (bk > 0) kingSafety += 10 * Math.min(bk, 2);
        if (shield === 3 && kg >= 1 && bk >= 1) kingSafety += 20;
    }
    if (bkr >= 0) {
        if (bkc >= 6 && bkr <= 1) kingSafety -= 30;
        else if (bkc <= 1 && bkr <= 1) kingSafety -= 40;
        let shield = 0;
        if (bkr < 7)
            for (let d = -1; d <= 1; d++) {
                let pc = bkc + d;
                if (pc >= 0 && pc < 8 && board[bkr + 1][pc] === 'p') { kingSafety -= 10; shield++; }
            }
        let kg = knightGuardCount(bkr, bkc, false);
        if (kg > 0) kingSafety -= 15 * Math.min(kg, 2);
        let bk = backupKnights(bkr, bkc, false);
        if (bk > 0) kingSafety -= 10 * Math.min(bk, 2);
        if (shield === 3 && kg >= 1 && bk >= 1) kingSafety -= 20;
    }

    let pawnStruct = EvaluatePawnStructure();
    return { material, pst, kingSafety, pawnStruct };
}

function AIEvaluate() {
    if (modifier === 2) return GetBlendedEval();
    let pw = PERSONAS[selectedPersona];
    let c = ComputeEvalComponents();
    return c.material * pw.wMaterial + c.pst * pw.wPST + c.kingSafety * pw.wKing + c.pawnStruct * pw.wPawn;
}

function GetBlendedEval() {
    let c = ComputeEvalComponents();
    let total = 0;
    for (let i = 0; i < 6; i++) {
        let pw = PERSONAS[i];
        total += fluentWeights[i] * (c.material * pw.wMaterial + c.pst * pw.wPST + c.kingSafety * pw.wKing + c.pawnStruct * pw.wPawn);
    }
    return total;
}

// ============ AI: SEARCH ============
function GenerateCaptures(forWhite) {
    let caps = [];
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++) {
            let p = board[r][c];
            if (p === '.' || forWhite !== IsWhitePiece(p)) continue;
            let targets = GetValidMoves(r, c);
            for (let t of targets)
                if (board[t.r][t.c] !== '.')
                    caps.push({ fr: r, fc: c, tr: t.r, tc: t.c });
        }
    return caps;
}

function Quiescence(alpha, beta, isMaximizing) {
    let standPat = AIEvaluate();
    if (isMaximizing) {
        if (standPat >= beta) return beta;
        if (standPat > alpha) alpha = standPat;
    } else {
        if (standPat <= alpha) return alpha;
        if (standPat < beta) beta = standPat;
    }
    let side = isMaximizing;
    let caps = GenerateCaptures(side);
    caps.sort((a, b) => {
        let ca = PIECE_VALS[board[a.tr][a.tc].toUpperCase()] || 0;
        let cb = PIECE_VALS[board[b.tr][b.tc].toUpperCase()] || 0;
        return cb - ca;
    });
    for (let m of caps) {
        let from = String.fromCharCode(97 + m.fc) + String.fromCharCode(48 + (8 - m.fr));
        let to = String.fromCharCode(97 + m.tc) + String.fromCharCode(48 + (8 - m.tr));
        if (!MovePiece(from, to)) continue;
        let score = Quiescence(alpha, beta, !isMaximizing);
        UndoMove();
        if (isMaximizing) {
            if (score >= beta) return beta;
            if (score > alpha) alpha = score;
        } else {
            if (score <= alpha) return alpha;
            if (score < beta) beta = score;
        }
    }
    return isMaximizing ? alpha : beta;
}

function AISearch(depth, alpha, beta, isMaximizing) {
    let pw = STRENGTHS[strengthLevel];
    if (depth === 0) return pw.quiescence ? Quiescence(alpha, beta, isMaximizing) : AIEvaluate();
    let side = isMaximizing;
    let moves = GenerateAllMoves(side);
    if (moves.length === 0) return isMaximizing ? -99999 : 99999;

    moves.sort((a, b) => {
        let ca = board[a.tr][a.tc] === '.' ? 0 : PIECE_VALS[board[a.tr][a.tc].toUpperCase()];
        let cb = board[b.tr][b.tc] === '.' ? 0 : PIECE_VALS[board[b.tr][b.tc].toUpperCase()];
        return cb - ca;
    });

    if (isMaximizing) {
        let maxScore = -Infinity;
        for (let m of moves) {
            let from = String.fromCharCode(97 + m.fc) + String.fromCharCode(48 + (8 - m.fr));
            let to = String.fromCharCode(97 + m.tc) + String.fromCharCode(48 + (8 - m.tr));
            if (!MovePiece(from, to)) continue;
            let score = AISearch(depth - 1, alpha, beta, false);
            if (score > maxScore) maxScore = score;
            if (score > alpha) alpha = score;
            UndoMove();
            if (alpha >= beta) break;
        }
        return maxScore;
    } else {
        let minScore = Infinity;
        for (let m of moves) {
            let from = String.fromCharCode(97 + m.fc) + String.fromCharCode(48 + (8 - m.fr));
            let to = String.fromCharCode(97 + m.tc) + String.fromCharCode(48 + (8 - m.tr));
            if (!MovePiece(from, to)) continue;
            let score = AISearch(depth - 1, alpha, beta, true);
            if (score < minScore) minScore = score;
            if (score < beta) beta = score;
            UndoMove();
            if (alpha >= beta) break;
        }
        return minScore;
    }
}

function GenerateAllMoves(forWhite) {
    let moves = [];
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++) {
            let p = board[r][c];
            if (p === '.' || forWhite !== IsWhitePiece(p)) continue;
            let targets = GetValidMoves(r, c);
            for (let t of targets)
                moves.push({ fr: r, fc: c, tr: t.r, tc: t.c });
        }
    return moves;
}

// ============ AI: THINK ============
function AIThinkAndMove() {
    if (gameMode !== 'ai') return;
    if (playerSide === whiteTurn) return;

    let savedPersona = selectedPersona;
    // Fluid (1): select sub-persona for this move
    if (modifier === 1) selectedPersona = SelectFluidPersona();
    // Fluent (2): drift blend weights
    if (modifier === 2) DriftFluentWeights();

    let strength = STRENGTHS[strengthLevel];
    let side = !playerSide;

    // Opening book
    if (Math.random() < strength.bookChance) {
        let bookMove = LookupBookMove();
        if (bookMove) {
            MovePiece(bookMove.from, bookMove.to);
            if (modifier === 1) selectedPersona = savedPersona;
            FinishAIMove();
            return;
        }
    }

    let moves = GenerateAllMoves(side);
    if (moves.length === 0) {
        gameStatus = "AI has no legal moves";
        document.getElementById('status').textContent = gameStatus;
        if (modifier === 1) selectedPersona = savedPersona;
        return;
    }

    if (Math.random() < strength.randomChance) {
        let pick = moves[Math.floor(Math.random() * moves.length)];
        let from = String.fromCharCode(97 + pick.fc) + String.fromCharCode(48 + (8 - pick.fr));
        let to = String.fromCharCode(97 + pick.tc) + String.fromCharCode(48 + (8 - pick.tr));
        MovePiece(from, to);
    } else {
        moves.sort((a, b) => {
            let ca = board[a.tr][a.tc] === '.' ? 0 : PIECE_VALS[board[a.tr][a.tc].toUpperCase()];
            let cb = board[b.tr][b.tc] === '.' ? 0 : PIECE_VALS[board[b.tr][b.tc].toUpperCase()];
            return cb - ca;
        });

        let bestScore = side ? -Infinity : Infinity;
        let bestIdx = 0;
        for (let i = 0; i < moves.length; i++) {
            let m = moves[i];
            let from = String.fromCharCode(97 + m.fc) + String.fromCharCode(48 + (8 - m.fr));
            let to = String.fromCharCode(97 + m.tc) + String.fromCharCode(48 + (8 - m.tr));
            if (!MovePiece(from, to)) continue;
            let score = AISearch(strength.depth, -Infinity, Infinity, side);
            if (side ? (score > bestScore) : (score < bestScore)) {
                bestScore = score;
                bestIdx = i;
            }
            UndoMove();
        }

        let best = moves[bestIdx];
        let from = String.fromCharCode(97 + best.fc) + String.fromCharCode(48 + (8 - best.fr));
        let to = String.fromCharCode(97 + best.tc) + String.fromCharCode(48 + (8 - best.tr));
        MovePiece(from, to);
    }

    if (modifier === 1) selectedPersona = savedPersona;
    FinishAIMove();
}

// ============ TOURNAMENT ============
function winProb(s1, s2) {
    let d1 = 1 + s1 * 0.5, d2 = 1 + s2 * 0.5;
    return d1 / (d1 + d2);
}

function InitTournament(n) {
    tournamentSize = n;
    tournamentActive = true;
    tournPlayers = [];
    tournMatches = [];
    tournHumanWins = 0;
    tournHumanLosses = 0;

    for (let i = 0; i < n - 1; i++) {
        let s = RandomStrengthTier();
        tournPlayers.push({ name: 'AI ' + (i + 1), strengthIdx: s, personaIdx: Math.floor(Math.random() * 6), modifierIdx: Math.floor(Math.random() * 3), seed: 0, isHuman: false });
    }
    let hs = RandomStrengthTier();
    tournPlayers.push({ name: 'You', strengthIdx: hs, personaIdx: 0, modifierIdx: 0, seed: 0, isHuman: true });

    tournPlayers.sort((a, b) => {
        if (a.strengthIdx !== b.strengthIdx) return b.strengthIdx - a.strengthIdx;
        if (a.isHuman !== b.isHuman) return a.isHuman ? -1 : 1;
        return 0;
    });
    for (let i = 0; i < n; i++) tournPlayers[i].seed = i + 1;
    tournHumanIdx = tournPlayers.findIndex(p => p.isHuman);

    let matchId = 0;
    let prevRound = [];

    for (let i = 0; i < n; i += 2) {
        tournMatches.push({ id: matchId, p1Idx: i, p2Idx: i + 1, winnerIdx: -1, time1: 0, time2: 0, played: false, isLoserMatch: false, nextMatchId: -1, nextLoserMatchId: -1 });
        prevRound.push(matchId);
        matchId++;
    }

    let mtr = n / 2;
    while (mtr > 1) {
        let nextRound = [];
        for (let i = 0; i < mtr; i += 2) {
            tournMatches.push({ id: matchId, p1Idx: -1, p2Idx: -1, winnerIdx: -1, time1: 0, time2: 0, played: false, isLoserMatch: false, nextMatchId: -1, nextLoserMatchId: -1 });
            tournMatches[prevRound[i]].nextMatchId = matchId;
            tournMatches[prevRound[i + 1]].nextMatchId = matchId;
            nextRound.push(matchId);
            matchId++;
        }
        prevRound = nextRound;
        mtr /= 2;
    }
    let wbChamp = prevRound[0];

    // Losers bracket
    let lbPrevRound = [];
    let lbSize = n / 4;
    let wbRoundStart = n / 2;

    // LB R1: losers from WB R1
    for (let i = 0; i < lbSize; i++) {
        tournMatches.push({ id: matchId, p1Idx: -1, p2Idx: -1, winnerIdx: -1, time1: 0, time2: 0, played: false, isLoserMatch: true, nextMatchId: -1, nextLoserMatchId: -1 });
        tournMatches[i * 2].nextLoserMatchId = matchId;
        tournMatches[i * 2 + 1].nextLoserMatchId = matchId;
        lbPrevRound.push(matchId);
        matchId++;
    }

    let wbRound = 1;
    while (lbSize >= 1) {
        let lbNextRound = [];
        let wbLosersStart = 0;
        for (let r = 0; r < wbRound; r++) wbLosersStart += n / Math.pow(2, r + 1);
        let wbLosers = n / Math.pow(2, wbRound + 1);

        // LB winners play each other
        for (let i = 0; i < lbPrevRound.length; i += 2) {
            if (i + 1 >= lbPrevRound.length) {
                tournMatches.push({ id: matchId, p1Idx: -1, p2Idx: -1, winnerIdx: -1, time1: 0, time2: 0, played: false, isLoserMatch: true, nextMatchId: -1, nextLoserMatchId: -1 });
                tournMatches[lbPrevRound[i]].nextMatchId = matchId;
                lbNextRound.push(matchId);
                matchId++;
            } else {
                tournMatches.push({ id: matchId, p1Idx: -1, p2Idx: -1, winnerIdx: -1, time1: 0, time2: 0, played: false, isLoserMatch: true, nextMatchId: -1, nextLoserMatchId: -1 });
                tournMatches[lbPrevRound[i]].nextMatchId = matchId;
                tournMatches[lbPrevRound[i + 1]].nextMatchId = matchId;
                lbNextRound.push(matchId);
                matchId++;
            }
        }

        // Merge WB losers
        if (wbLosers > 0 && wbRound < Math.log2(n) - 1) {
            let mergeCount = Math.min(wbLosers, lbNextRound.length);
            for (let i = 0; i < mergeCount; i++) {
                let lbMidx = lbNextRound[i];
                let wbMidx = wbLosersStart + i;
                if (wbMidx < tournMatches.length) {
                    tournMatches[wbMidx].nextLoserMatchId = lbMidx;
                }
            }
        }

        lbPrevRound = lbNextRound;
        lbSize /= 2;
        wbRound++;
    }

    // Grand final
    tournMatches.push({ id: matchId, p1Idx: -1, p2Idx: -1, winnerIdx: -1, time1: 0, time2: 0, played: false, isLoserMatch: false, nextMatchId: -1, nextLoserMatchId: -1 });
    tournMatches[wbChamp].nextMatchId = matchId;
    if (lbPrevRound.length > 0) tournMatches[lbPrevRound[0]].nextMatchId = matchId;
    matchId++;

    // Grand final reset
    tournMatches.push({ id: matchId, p1Idx: -1, p2Idx: -1, winnerIdx: -1, time1: 0, time2: 0, played: false, isLoserMatch: true, nextMatchId: -1, nextLoserMatchId: -1 });
    tournMatches[matchId - 2].nextLoserMatchId = matchId;

    tournCurrentMatch = -1;
    ResolveAllAIMatches();
    SaveTournament();
}

function ResolveAIMatch(mi) {
    if (mi < 0 || mi >= tournMatches.length) return;
    let m = tournMatches[mi];
    if (m.played || m.p1Idx < 0 || m.p2Idx < 0) return;
    let prob = winProb(tournPlayers[m.p1Idx].strengthIdx, tournPlayers[m.p2Idx].strengthIdx);
    m.winnerIdx = Math.random() < prob ? m.p1Idx : m.p2Idx;
    m.played = true;
    AdvanceTournament(mi, m.winnerIdx);
}

function AdvanceTournament(mi, wi) {
    if (mi < 0 || mi >= tournMatches.length) return;
    let m = tournMatches[mi];
    if (m.nextMatchId >= 0 && m.nextMatchId < tournMatches.length) {
        let n = tournMatches[m.nextMatchId];
        if (n.p1Idx < 0) n.p1Idx = wi;
        else if (n.p2Idx < 0) n.p2Idx = wi;
    }
    if (m.nextLoserMatchId >= 0 && m.nextLoserMatchId < tournMatches.length) {
        let li = m.p1Idx === wi ? m.p2Idx : m.p1Idx;
        let n = tournMatches[m.nextLoserMatchId];
        if (n.p1Idx < 0) n.p1Idx = li;
        else if (n.p2Idx < 0) n.p2Idx = li;
    }
}

function ResolveAllAIMatches() {
    for (let m of tournMatches) {
        if (m.played) continue;
        if (m.p1Idx === tournHumanIdx || m.p2Idx === tournHumanIdx) continue;
        if (m.p1Idx < 0 || m.p2Idx < 0) continue;
        ResolveAIMatch(m.id);
    }
}

function GetHumanMatch() {
    return tournMatches.find(m => !m.played && (m.p1Idx === tournHumanIdx || m.p2Idx === tournHumanIdx) && m.p1Idx >= 0 && m.p2Idx >= 0);
}

function GetMatchResult(mi) {
    let m = tournMatches[mi];
    if (!m.played || m.winnerIdx < 0) return null;
    return { winner: m.winnerIdx,
        winnerIsHuman: m.winnerIdx === tournHumanIdx,
        p1Won: m.winnerIdx === m.p1Idx,
        time: m.time1 + m.time2 };
}

function SaveTournament() {
    let data = { players: tournPlayers, matches: tournMatches.map(m => ({...m})),
        size: tournamentSize, humanIdx: tournHumanIdx, wins: tournHumanWins, losses: tournHumanLosses };
    try { localStorage.setItem('chessTournament', JSON.stringify(data)); } catch(e) {}
}

function LoadTournament() {
    try {
        let raw = localStorage.getItem('chessTournament');
        if (!raw) return false;
        let data = JSON.parse(raw);
        tournamentSize = data.size;
        tournPlayers = data.players;
        tournMatches = data.matches;
        tournHumanIdx = data.humanIdx;
        tournHumanWins = data.wins;
        tournHumanLosses = data.losses;
        tournamentActive = true;
        return true;
    } catch(e) { return false; }
}

function ClearTournamentSave() {
    try { localStorage.removeItem('chessTournament'); } catch(e) {}
}

function ShowLessonList(filter) {
    categoryFilter = filter;
    familyFilter = '';
    let title = filter === '' ? 'All Lessons' : (filter === 'White' ? 'White Openings' : 'Black Defenses');
    document.getElementById('lesson-list-header').innerHTML = `<h2>${title}</h2>`;

    let indices = [];
    for (let i = 0; i < teachingGames.length; i++)
        if (filter === '' || teachingGames[i].category === filter)
            indices.push(i);

    const diffOrder = { 'Beginner': 0, 'Intermediate': 1, 'Expert': 2 };
    const catOrder = { 'White': 0, 'Black': 1 };
    indices.sort((a, b) => {
        let da = diffOrder[teachingGames[a].difficulty];
        if (da === undefined) da = 99;
        let db = diffOrder[teachingGames[b].difficulty];
        if (db === undefined) db = 99;
        if (da !== db) return da - db;
        let ca = catOrder[teachingGames[a].category];
        if (ca === undefined) ca = 99;
        let cb = catOrder[teachingGames[b].category];
        if (cb === undefined) cb = 99;
        return ca - cb;
    });

    let html = '';
    let currentDiff = '';
    for (let j = 0; j < indices.length; j++) {
        let i = indices[j];
        if (teachingGames[i].difficulty !== currentDiff) {
            currentDiff = teachingGames[i].difficulty;
            html += `<div class="diff-header">[${currentDiff}]</div>`;
        }
        html += `<div class="lesson-item" data-idx="${i}">${j + 1}. ${teachingGames[i].name}</div>`;
    }
    document.getElementById('lesson-list-wrap').innerHTML = html;

    document.querySelectorAll('.lesson-item').forEach(el => {
        el.addEventListener('click', function() {
            let idx = parseInt(this.dataset.idx);
            StartLesson(idx);
        });
    });

    ShowScreen('screen-lessonlist');
}

// ============ LESSON SCREEN ============
function StartLesson(idx) {
    lessonIndex = idx;
    lessonMove = 0;
    InitializeBoard();
    whiteTurn = true;
    ShowScreen('screen-lesson');
    RenderLesson();
}

function RenderLesson() {
    if (lessonIndex < 0 || lessonIndex >= teachingGames.length) return;
    let game = teachingGames[lessonIndex];

    document.getElementById('lesson-name').textContent = game.name;
    RenderBoardHTML('board-wrap-lesson', -1, -1);

    let info = '';
    if (lessonMove === 0) {
        info = "Ready to begin";
    } else {
        let moveNum = Math.floor((lessonMove - 1) / 2) + 1;
        let m = game.moves[lessonMove - 1];
        if ((lessonMove - 1) % 2 === 0)
            info = "Move " + moveNum + ": " + m.from + "-" + m.to;
        else
            info = "Move " + moveNum + "... " + m.from + "-" + m.to;
    }
    document.getElementById('lesson-info').textContent = info;

    if (lessonMove > 0) {
        document.getElementById('lesson-comment').textContent = game.moves[lessonMove - 1].comment;
    } else {
        document.getElementById('lesson-comment').textContent = game.description;
    }

    let isEnd = lessonMove >= game.moves.length;
    let btnHtml = '';
    btnHtml += '<button class="btn btn-small" id="btn-prev">Previous</button>';
    btnHtml += '<button class="btn btn-small" id="btn-restart">Restart</button>';
    if (!isEnd) {
        btnHtml += '<button class="btn btn-small" id="btn-next">Next</button>';
    } else {
        document.getElementById('lesson-comment').textContent = "Lesson complete!";
        btnHtml += '<button class="btn btn-small" id="btn-next">Back to List</button>';
    }
    document.getElementById('lesson-buttons').innerHTML = btnHtml;

    document.getElementById('btn-next').addEventListener('click', function() {
        if (!isEnd) {
            MovePiece(game.moves[lessonMove].from, game.moves[lessonMove].to);
            lessonMove++;
            RenderLesson();
        } else {
            ExitLesson();
        }
    });

    document.getElementById('btn-prev').addEventListener('click', function() {
        if (lessonMove > 0) {
            UndoMove();
            lessonMove--;
            RenderLesson();
        }
    });

    document.getElementById('btn-restart').addEventListener('click', function() {
        StartLesson(lessonIndex);
    });
}

function ExitLesson() {
    lessonIndex = -1;
    lessonMove = 0;
    if (familyFilter) {
        ShowFamilyLessons();
    } else {
        ShowLessonList(categoryFilter);
    }
}

function LessonListBack() {
    lessonIndex = -1;
    if (familyFilter) {
        ShowFamilyList();
    } else {
        ShowCategory();
    }
}

let peer = null;
let conn = null;
let multiplayerRole = '';
let isMultiplayer = false;

function ShowMultiplayer() {
    ShowScreen('screen-multiplayer');
}

function ShowJoinGame() {
    document.getElementById('join-status').textContent = '';
    document.getElementById('join-code-input').value = '';

function HostGame() {
    if (typeof Peer === 'undefined') {
        document.getElementById('host-status').textContent = 'PeerJS library failed to load. Check internet connection.';
        ShowScreen('screen-host');
        document.getElementById('host-status').textContent = 'PeerJS library failed to load. Check internet connection.';
        return;
    }
    multiplayerRole = 'host';
    isMultiplayer = true;
    InitializeBoard();
    selRow = selCol = -1;
    whiteClock = 0;
    blackClock = 0;
    ResetClock(true);
    gameStatus = "Waiting for opponent...";

    document.getElementById('host-status').textContent = 'Creating room...';
    document.getElementById('room-code-wrap').style.display = 'none';
    ShowScreen('screen-host');

    if (peer) { peer.destroy(); peer = null; }
    peer = new Peer();

    peer.on('open', function(id) {
        document.getElementById('host-status').textContent = 'Room ready!';
        document.getElementById('code-display').textContent = id;
        document.getElementById('room-code-wrap').style.display = 'block';
    });

    peer.on('connection', function(c) {
        conn = c;
        document.getElementById('host-status').textContent = 'Opponent connected!';
        conn.on('data', handleRemoteData);
        conn.on('close', function() {
            gameStatus = 'Opponent disconnected';
            if (currentScreen === 'play')
                document.getElementById('status').textContent = gameStatus;
        });
        whiteTurn = true;
        gameStatus = "White's turn  You are White";
        ShowScreen('screen-play');
        RenderBoardHTML('board-wrap', selRow, selCol);
        document.getElementById('status').textContent = gameStatus;
        UpdateHistoryDisplay();
        UpdateClockDisplay();
    });

    peer.on('error', function(err) {
        document.getElementById('host-status').textContent = 'Error: ' + err.type;
    });
}

function JoinGame() {
    if (typeof Peer === 'undefined') {
        document.getElementById('join-status').textContent = 'PeerJS library failed to load. Check internet connection.';
        return;
    }
    multiplayerRole = 'join';
    isMultiplayer = true;
    InitializeBoard();
    selRow = selCol = -1;
    whiteClock = 0;
    blackClock = 0;
    ResetClock(true);

    let hostId = document.getElementById('join-code-input').value.trim();
    if (!hostId) {
        document.getElementById('join-status').textContent = 'Please enter a host code';
        return;
    }

    document.getElementById('join-status').textContent = 'Connecting...';

    if (peer) { peer.destroy(); peer = null; }
    peer = new Peer();

    peer.on('open', function() {
        conn = peer.connect(hostId);
        conn.on('open', function() {
            whiteTurn = false;
            gameStatus = "Connected  You are Black";
            ShowScreen('screen-play');
            RenderBoardHTML('board-wrap', selRow, selCol);
            document.getElementById('status').textContent = gameStatus;
            UpdateHistoryDisplay();
            UpdateClockDisplay();
        });
        conn.on('data', handleRemoteData);
        conn.on('close', function() {
            gameStatus = 'Host disconnected';
            if (currentScreen === 'play')
                document.getElementById('status').textContent = gameStatus;
        });
        conn.on('error', function() {
            document.getElementById('join-status').textContent = 'Connection failed. Check the code and try again.';
        });
    });

    peer.on('error', function(err) {
        document.getElementById('join-status').textContent = 'Error: ' + err.type;
    });
}

function handleRemoteData(data) {
    if (data.type === 'move' && MovePiece(data.from, data.to)) {
        let inCheck = IsInCheck(whiteTurn);
        gameStatus = whiteTurn ? "White's turn" : "Black's turn";
        if (inCheck) gameStatus += ' \u2014 Check!';
        selRow = selCol = -1;
        RenderBoardHTML('board-wrap', selRow, selCol);
        document.getElementById('status').textContent = gameStatus;
        UpdateHistoryDisplay();
        UpdateClockDisplay();
    }
}

function CancelHost() {
    if (peer) { peer.destroy(); peer = null; }
    conn = null;
    isMultiplayer = false;
    multiplayerRole = '';
    ShowMultiplayer();
}
function CancelJoin() {
    if (peer) { peer.destroy(); peer = null; }
    conn = null;
    isMultiplayer = false;
    multiplayerRole = '';
    ShowMultiplayer();
}

function CopyRoomCode() {
    let code = document.getElementById('code-display').textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code);
    } else {
        let ta = document.createElement('textarea');
        ta.value = code;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
    }
}
