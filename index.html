function ShowTournamentBracket() {
    if (!tournamentActive) { BackToMenu(); return; }
    ShowScreen('screen-tournament-bracket');

    let wrap = document.getElementById('tourn-bracket-wrap');
    let info = document.getElementById('tourn-info');
    let remaining = tournMatches.filter(m => !m.played && m.p1Idx >= 0 && m.p2Idx >= 0 && m.p1Idx !== tournHumanIdx && m.p2Idx !== tournHumanIdx).length;
    let pending = GetHumanMatch();

    info.textContent = 'Players: ' + tournamentSize + ' | Matches remaining: ' + remaining + ' AI + ' + (pending ? '1 human' : '0');

    let playBtn = document.getElementById('tourn-play-btn');
    let resultsBtn = document.getElementById('tourn-results-btn');
    playBtn.style.display = pending ? 'inline-block' : 'none';

    let allDone = tournMatches.every(m => m.played || m.p1Idx < 0 || m.p2Idx < 0);
    resultsBtn.style.display = allDone ? 'inline-block' : 'none';

    if (allDone) {
        info.textContent += ' | Tournament complete!';
    }

    // Render bracket as list
    let html = '<div style="display:flex;flex-direction:column;gap:3px;font-size:12px;min-width:600px">';
    let rounds = [];
    let current = tournMatches.filter(m => !m.isLoserMatch);
    for (let r = 0; current.length > 0; r++) {
        let next = [];
        let roundHtml = '<div style="border:1px solid #444;padding:4px;margin:2px 0;background:#1a1a1a">';
        roundHtml += '<b>' + (r === 0 ? 'Round 1 (Winners)' : 'Winners Round ' + (r+1)) + '</b>';
        for (let m of current) {
            let p1 = m.p1Idx >= 0 ? tournPlayers[m.p1Idx].name : 'TBD';
            let p2 = m.p2Idx >= 0 ? tournPlayers[m.p2Idx].name : 'TBD';
            let w = m.winnerIdx >= 0 ? tournPlayers[m.winnerIdx].name : '?';
            let status = m.played ? 'Winner: ' + w : (m.p1Idx >= 0 && m.p2Idx >= 0 ? 'Pending' : 'Waiting');
            let highlight = m.p1Idx === tournHumanIdx || m.p2Idx === tournHumanIdx ? ' style="color:#4caf50;font-weight:bold"' : '';
            roundHtml += '<div' + highlight + '>' + p1 + ' vs ' + p2 + ' — ' + status + '</div>';
            if (m.nextMatchId >= 0) next.push(tournMatches[m.nextMatchId]);
        }
        roundHtml += '</div>';
        html += roundHtml;
        current = next.filter((v,i,a) => a.indexOf(v)===i);
    }

    // Losers bracket
    let lbCurrent = tournMatches.filter(m => m.isLoserMatch && !tournMatches.some(m2 => m2.isLoserMatch && m2.nextMatchId === m.id || m2.nextLoserMatchId === m.id));
    for (let r = 0; lbCurrent.length > 0; r++) {
        let next = [];
        let roundHtml = '<div style="border:1px solid #664;padding:4px;margin:2px 0;background:#151515">';
        roundHtml += '<b>Losers Round ' + (r+1) + '</b>';
        for (let m of lbCurrent) {
            if (m.p1Idx < 0 && m.p2Idx < 0) continue;
            let p1 = m.p1Idx >= 0 ? tournPlayers[m.p1Idx].name : 'TBD';
            let p2 = m.p2Idx >= 0 ? tournPlayers[m.p2Idx].name : 'TBD';
            let w = m.winnerIdx >= 0 ? tournPlayers[m.winnerIdx].name : '?';
            let status = m.played ? 'Winner: ' + w : (m.p1Idx >= 0 && m.p2Idx >= 0 ? 'Pending' : 'Waiting');
            let highlight = m.p1Idx === tournHumanIdx || m.p2Idx === tournHumanIdx ? ' style="color:#4caf50;font-weight:bold"' : '';
            roundHtml += '<div' + highlight + '>' + p1 + ' vs ' + p2 + ' — ' + status + '</div>';
            if (m.nextMatchId >= 0) next.push(tournMatches[m.nextMatchId]);
            if (m.nextLoserMatchId >= 0) next.push(tournMatches[m.nextLoserMatchId]);
        }
        roundHtml += '</div>';
        html += roundHtml;
        lbCurrent = next.filter((v,i,a) => a.indexOf(v)===i).filter(m => m && !m.played && m.id);
    }
    html += '</div>';
    wrap.innerHTML = html;
}

function PlayNextTournamentMatch() {
    let m = GetHumanMatch();
    if (!m) { ShowTournamentBracket(); return; }
    tournCurrentMatch = m.id;

    // Set up the game
    gameMode = 'ai';
    if (tournPlayers[m.p1Idx].isHuman) {
        playerSide = true;
    } else {
        playerSide = false;
    }
    let aiStrength = m.p1Idx === tournHumanIdx ? tournPlayers[m.p2Idx].strengthIdx : tournPlayers[m.p1Idx].strengthIdx;
    strengthLevel = aiStrength;
    selectedPersona = m.p1Idx === tournHumanIdx ? tournPlayers[m.p2Idx].personaIdx : tournPlayers[m.p1Idx].personaIdx;
    modifier = m.p1Idx === tournHumanIdx ? tournPlayers[m.p2Idx].modifierIdx : tournPlayers[m.p1Idx].modifierIdx;

    InitializeBoard();
    selRow = selCol = -1;
    whiteTurn = true;
    moveCount = 1;
    moveHistory = [];
    boardStates = [];
    enPassantRow = enPassantCol = -1;
    aiThinking = false;
    whiteClock = 0;
    blackClock = 0;
    ResetClock(true);
    UpdateClockDisplay();

    let status = 'Tournament match — ' + tournPlayers[m.p1Idx].name + ' vs ' + tournPlayers[m.p2Idx].name;
    let p1Name = tournPlayers[m.p1Idx].name;
    let p2Name = tournPlayers[m.p2Idx].name;
    document.getElementById('screen-play-title').textContent = p1Name + ' vs ' + p2Name;
    document.getElementById('status').textContent = status;
    RenderBoardHTML('board-wrap', selRow, selCol);
    ShowScreen('screen-play');

    if (!playerSide) {
        setTimeout(function() {
            AITryMove();
        }, 500);
    }
    UpdateHistoryDisplay();
}

function ShowTournamentResults() {
    ShowScreen('screen-tournament-results');
    let wrap = document.getElementById('tourn-results-wrap');

    // Find final match
    let final = tournMatches[tournMatches.length - 1];
    let winner = final.winnerIdx >= 0 ? tournPlayers[final.winnerIdx] : null;
    let html = '';
    if (winner) {
        html += '<div style="font-size:18px;color:#ffd700;margin:8px">Champion: ' + winner.name + '</div>';
    }

    html += '<table style="border-collapse:collapse;margin:8px auto;font-size:13px">';
    html += '<tr style="background:#333"><th>Seed</th><th>Player</th><th>W</th><th>L</th></tr>';
    let sorted = [...tournPlayers].sort((a,b) => a.seed - b.seed);
    for (let p of sorted) {
        let w = tournMatches.filter(m => m.winnerIdx === tournPlayers.indexOf(p)).length;
        let l = tournMatches.filter(m => m.p1Idx === tournPlayers.indexOf(p) || m.p2Idx === tournPlayers.indexOf(p)).filter(m => m.played && m.winnerIdx !== tournPlayers.indexOf(p)).length;
        let style = p.isHuman ? ' style="color:#4caf50;font-weight:bold"' : '';
        html += '<tr' + style + '><td>' + p.seed + '</td><td>' + p.name + '</td><td>' + w + '</td><td>' + l + '</td></tr>';
    }
    html += '</table>';
    wrap.innerHTML = html;
}

// ============ CLOCK ============
let turnStartTime = 0;

function ResetClock(toWhite) {
    turnStartTime = performance.now();
}

function UpdateClockDisplay() {
    if (typeof whiteClock === 'undefined') return;
    let wSec = Math.floor((whiteClock || 0) / 1000);
    let wMin = Math.floor(wSec / 60); wSec %= 60;
    let bSec = Math.floor((blackClock || 0) / 1000);
    let bMin = Math.floor(bSec / 60); bSec %= 60;
    let wDisplay = wMin + ':' + String(wSec).padStart(2,'0');
    let bDisplay = bMin + ':' + String(bSec).padStart(2,'0');
    if (whiteTurn) {
        let e = Math.max(0, performance.now() - (turnStartTime || performance.now()));
        let es = Math.floor(e / 1000);
        let em = Math.floor(es / 60); es %= 60;
        wDisplay += '+' + em + ':' + String(es).padStart(2,'0');
    } else {
        let e = Math.max(0, performance.now() - (turnStartTime || performance.now()));
        let es = Math.floor(e / 1000);
        let em = Math.floor(es / 60); es %= 60;
        bDisplay += '+' + em + ':' + String(es).padStart(2,'0');
    }
    document.getElementById('clock-display').textContent = '\u25cf ' + wDisplay + '  |  ' + bDisplay + ' \u25cf';
}

// Update clock display every second during play
setInterval(function() {
    if (currentScreen === 'play') UpdateClockDisplay();
}, 1000);

function UpdateClock(toWhite) {
    let now = performance.now();
    let elapsed = now - turnStartTime;
    if (toWhite) whiteClock += elapsed;
    else blackClock += elapsed;
    turnStartTime = now;
}

// Save tournament when returning from a match
function BackToMenu() {
    if (tournamentActive && tournCurrentMatch >= 0) {
        // Record clock time for the match
        let m = tournMatches[tournCurrentMatch];
        if (m) {
            m.time1 = whiteClock;
            m.time2 = blackClock;
            m.played = true;

            // Determine who won this game
            let humanIdx = tournHumanIdx;
            let p1IsHuman = m.p1Idx === humanIdx;
            let p2IsHuman = m.p2Idx === humanIdx;
            let humanWon = (p1IsHuman && whiteTurn === false) || (p2IsHuman && whiteTurn === true);
            if (humanWon) tournHumanWins++;
            else tournHumanLosses++;
            let loserIdx = m.p1Idx === humanIdx ? m.p2Idx : m.p1Idx;
            AdvanceTournament(tournCurrentMatch, m.winnerIdx < 0 ? (humanWon ? humanIdx : loserIdx) : m.winnerIdx);
        }
        tournCurrentMatch = -1;
        SaveTournament();
    }
    tournCurrentMatch = -1;
    selRow = selCol = -1;
    lessonIndex = -1;
    familyFilter = '';
    gameMode = 'free';
    if (isMultiplayer) {
        if (conn) { conn.close(); conn = null; }
        if (peer) { peer.destroy(); peer = null; }
        isMultiplayer = false;
        multiplayerRole = '';
    }
    if (tournamentActive) {
        ResolveAllAIMatches();
        SaveTournament();
        ShowTournamentBracket();
    } else {
        ShowScreen('screen-menu');
    }
}
document.addEventListener('keydown', function(e) {
    if (currentScreen === 'play') {
        if (e.key === 'Escape') BackToMenu();
        if ((e.key === 'u' || e.key === 'U') && !isMultiplayer) {
            UndoLastMove();
        }
        if (e.key === 'p' || e.key === 'P') {
            ExportPGNFromUI();
        }
    }
    if (currentScreen === 'lesson') {
        if (e.key === 'Escape') ExitLesson();
        if (e.key === ' ' || e.key === 'Enter') {
            let btn = document.getElementById('btn-next');
            if (btn) btn.click();
        }
    }
    if (currentScreen === 'multiplayer' || currentScreen === 'host' || currentScreen === 'join') {
        if (e.key === 'Escape') BackToMenu();
    }
});

// ============ SIZING & ZOOM ============
let zoom = 1.0;

function applySizing() {
    let viewW = window.innerWidth;
    let avail = viewW - 20;
    let autoSq = Math.floor(avail / 8.4);
    autoSq = Math.max(30, Math.min(60, autoSq));
    let sq = Math.round(autoSq * zoom);
    sq = Math.max(20, Math.min(120, sq));
    document.documentElement.style.setProperty('--sq', sq + 'px');
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
}

window.addEventListener('load', applySizing);
window.addEventListener('resize', applySizing);

document.getElementById('zoom-slider').addEventListener('input', function() {
    zoom = parseFloat(this.value);
    applySizing();
});

// ============ INIT ============
InitializeBoard();
applySizing();
</script>
